<!DOCTYPE html>
<html>
<head>
    <title>MULTIPLE DISEASE DETECTION</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

    <style>
        body {
            background: radial-gradient(ellipse at center, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJwWNzO6g0NLvkv7mCeTnRIkQIzs8w_y6KJQ&s');
            background-size: 100% 100vh;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        h1 { color: rgb(69, 3, 3); text-align: center; padding-top: 50px; }
        h2 { text-align: center; }
        h4 { text-align: center; }
        .imageCoose {
            width: 50%;
            margin: auto;
            padding: 50px;
            background-color: rgba(0, 0, 0, 0.50);
            color: white;
            text-align: center;
        }
        .row {
            background-color: wheat;
            font-size: 14px;
            margin: 150px 50px;
            padding: 50px;
        }
        img {
            width: 100%;
            margin-bottom: 30px;
        }
        input[type=submit], input[type=file] {
            width: 50%;
            border: 1px solid #ffffff;
            color: white;
            background-color: transparent;
            padding: 14px 0;
            margin: 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type=submit] {
            border: 1px solid #ffffff;
        }
        input[type=submit]:hover {
            background-color: #ffffff;
            color: black;
        }
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }
        .dropdown-menu {
            background-color: #7c0f0f;
        }
        .dropdown-menu li a {
            color: rgb(223, 21, 21);
        }
        .dropdown-menu li a:hover {
            background-color: #575757;
        }
    </style>
</head>

<body> 
    <!-- Navigation Bar -->
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNavbar">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>                        
                </button>
                <a class="navbar-brand" data-value="#form1" onclick="toggleform(event)">MULTIPLE DISEASE DETECTION</a>
            </div>
            <div class="collapse navbar-collapse" id="myNavbar">
                <ul class="nav navbar-nav">
                    <!-- Dropdown for disease categories -->
                    <li class="dropdown">
                        <a class="dropdown-toggle" data-toggle="dropdown" href="#"><span class="caret"></span></a>
                        <ul class="dropdown-menu">
                           
                            
                           
                        </ul>
                    </li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="graph.html" class="active">Graph</a></li>
                    <li><a href="/logout"><span class="glyphicon glyphicon-log-out"></span> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Alert Message -->
    <div class="container">
        {% if msg %}
        <div class="alert alert-warning alert-dismissible">
            <a href="#" class="close" data-dismiss="alert" aria-label="close">&times;</a>
            <strong>Warning!</strong> {{ msg }}
        </div>
        {% endif %}
    </div>

    <!-- Header -->
    <h1>An Image Classification and Retrieval Hybrid Model for Larger Healthcare Datasets using Deep Learning</h1>
    <hr>

    <!-- Image Upload Form -->
    <div class="imageCoose">
        <h2>Select Image</h2>
        <hr>
        <form action="{{ url_for('image') }}" method="POST" style="display: flex; flex-direction: column; align-items: center;">
            <label for="diseaseType" style="color: white; font-size: 16px;">Select Model Type:</label>
            <select id="diseaseType" name="diseaseType" required style="width: 50%; padding: 10px; margin-bottom: 15px; border-radius: 5px;color: black;">
                <option value="">-- Select --</option>
               
                <option value="ResNet">ResNet</option>
                <option value="Vgg">Vgg</option>
                
            </select>

            <input type="file" id="file" name="filename" required>
            <input type="submit" value="Analyse">
        </form>
    </div>

</body>
</html>
